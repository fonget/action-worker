name: Badge Updater
on:
  workflow_run:
    workflows: ["Task Handler"]
    types: [completed]

permissions:
  contents: write

jobs:
  badge_updater:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - name: 检出源码仓库
        uses: actions/checkout@v6

      - name: 文档徽章更新
        run: |
          set -euo pipefail
          
          DISPLAY_DATE=$(date -u +'%Y--%m--%d')
          HIDDEN_SALT=$(date -u +'%Y-%m-%d %H:%M:%S')
          
          sed -i "s:{{LAST_UPDATE}}:${DISPLAY_DATE}:g" README.md
          sed -i "s:最近更新-[0-9]\{4\}--[0-9]\{2\}--[0-9]\{2\}-007acc:最近更新-${DISPLAY_DATE}-007acc:g" README.md
          
          if grep -q "<!-- LAST_SYNC:" README.md; then
            sed -i "s|<!-- LAST_SYNC\:.* -->|<!-- LAST_SYNC\: ${HIDDEN_SALT} -->|" README.md
          else
            echo -e "\n<!-- LAST_SYNC: ${HIDDEN_SALT} -->" >> README.md
          fi          
          
          git config --local user.name "github-actions[bot]"
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          if [ -d ".githooks" ]; then
            echo "::info::检测到 .githooks 文件夹，使用自动备注。"
            git config --local core.hooksPath .githooks
            chmod +x .githooks/prepare-commit-msg
            COMMIT_MSG="update"
          else
            echo "::warning::未发现 .githooks 文件夹，使用默认备注。"
            COMMIT_MSG="chore: update badge ${DISPLAY_DATE}"
          fi
          
          git add .

          if [[ -n "$(git status --porcelain)" ]]; then
            git commit -m "$COMMIT_MSG" -m "[skip ci]"
            git push
          fi

      - name: 工作流状态验证
        if: always() 
        run: |
          echo "Workflow : ${{ github.event.workflow_run.name }}"
          echo "Conclusion: ${{ github.event.workflow_run.conclusion }}"
          [[ "${{ github.event.workflow_run.conclusion }}" == "success" ]] || exit 1